# GitLab CI/CD configuration for Zola static site deployment
# Alternative to GitHub Pages - use this if deploying to GitLab Pages

image: alpine:latest

variables:
  ZOLA_VERSION: "0.22.1"
  ZOLA_URL: "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"

before_script:
  - apk add --no-cache wget tar
  - wget -q ${ZOLA_URL}
  - tar -xzf zola-v*.tar.gz
  - mv zola /usr/local/bin

pages:
  stage: deploy
  script:
    - cd zdocs
    - zola build --base-url ${CI_PAGES_URL}
  artifacts:
    paths:
      - public
  only:
    - main

